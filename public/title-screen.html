<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="twitter:card" content="summary_large_image">
    <title>Woo Pong</title>
    <style>
      body {
        opacity: 0;
        transition: opacity 300ms ease-in-out;
      }

      body.loaded {
        opacity: 1;
      }
    </style>
    <link rel="stylesheet" href="css/title-screen.css" />
  </head>

  <body>
     <canvas id="bg-canvas" style="position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;display:block;"></canvas>
     <section id="main" style="position:relative;z-index:1;">
      <h1 class="toHide"
      >Quantum Woo Pong</h1>
      <h3 class="toHide"
      >Mystical Physics Puzzle</h3>
      <ol style="visibility: hidden;">
        <li><strong>Observe</strong><br><span>Watch and remain open-minded</span></li>
        <li><strong>Choose</strong><br><span>Predict which ball will finish first</span></li>
        <li><strong>Grow</strong><br><span>Unlock the power of your subconscious</span></li>
      </ol>
        <a id="start-button" style="width:400px;max-width:80%;font-size:1em" class="details-button">
          LOADING
        </a>
    </section>

  <script>
    // Ensure canvas is sized to fill the viewport
    function resizeCanvas() {
      const canvas = document.getElementById('bg-canvas');
      if (canvas) {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
    }
    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('DOMContentLoaded', resizeCanvas);
    window.addEventListener('load', function () {
      document.querySelector('body').className = 'loaded';
    })

    function toggleDetails(el) {
      if (document.querySelectorAll("details[open]").length == document.querySelectorAll("details").length) {
        let details = document.querySelectorAll("details");
        for (i = 0; i < details.length; i++) {
          details[i].open = false;
        }
      } else {
        let details = document.querySelectorAll("details");
        for (i = 0; i < details.length; i++) {
          details[i].open = true;
        }
      }
    }

    function checkDetailsStatus(el) {
    }
  </script>

</html>
